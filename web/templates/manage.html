<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPlaySync 관리</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23ff0000%22/><polygon points=%2235,30 35,70 75,50%22 fill=%22%23ffffff%22/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css?v=8">
</head>
<body class="manage-page">
    <div class="background-gradient"></div>

    <div class="glass-container manage-container">
        <div class="background-blobs">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
        </div>

        <header>
            <div class="logo">
                <i class="fa-brands fa-youtube" style="color: #ff0000;"></i> UPlaySync 관리
            </div>
            <div class="header-controls">
                <div class="status-badge" id="manageStatusBadge">
                    <span class="dot"></span>
                    <span id="manageStatusText">불러오는 중</span>
                </div>
                <button id="reloadManageBtn" class="icon-button" title="새로고침">
                    <i class="fa-solid fa-rotate"></i>
                </button>
                <a href="/" class="icon-button" title="메인으로">
                    <i class="fa-solid fa-house"></i>
                </a>
            </div>
        </header>

        <main class="manage-main">
            {% include '_management_sections.html' %}
        </main>
    </div>

    <script src="/static/manage.js?v=3"></script>
</body>
</html>
